name: Publish

on:
  release:
    types: [created]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      # Ensure npm CLI is new enough for Trusted Publishing flows
      - run: npm i -g npm@latest
      - run: npm -v

      - run: npm ci

      # Set package.json version from the release tag (e.g. v3.2.7 → 3.2.7)
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "VERSION=${VERSION}"
          if [ -z "${VERSION}" ]; then
            echo "Error: could not determine version from GITHUB_REF_NAME='${GITHUB_REF_NAME}'"
            exit 1
          fi
          npm version "${VERSION}" --no-git-tag-version --ignore-scripts

      - run: npm run build

      # Public packages sometimes need this explicitly (safe even if already public)
      - run: npm publish --access public
